version: "3.9"

services:
  # ── FastAPI Application ───────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.api
    container_name: verifundu-api
    ports:
      - "8000:8000"
    environment:
      - ENVIRONMENT=development
      - POSTGRES_HOST=postgres
      - REDIS_HOST=redis
      - MINIO_ENDPOINT=http://minio:9000
    env_file: .env
    volumes:
      - ./:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
    restart: unless-stopped
    networks: [verifundu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Celery Worker ─────────────────────────────────────────────
  celery:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.api
    container_name: verifundu-celery
    command: celery -A pipeline.orchestrator worker --loglevel=info --concurrency=4 --queues=pipeline,high_priority
    environment:
      - ENVIRONMENT=development
      - POSTGRES_HOST=postgres
      - REDIS_HOST=redis
      - MINIO_ENDPOINT=http://minio:9000
    env_file: .env
    volumes:
      - ./:/app
    depends_on:
      - redis
      - postgres
    restart: unless-stopped
    networks: [verifundu]

  # ── Celery Beat (scheduled tasks) ────────────────────────────
  celery-beat:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.api
    container_name: verifundu-beat
    command: celery -A pipeline.orchestrator beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    env_file: .env
    depends_on: [redis, postgres]
    restart: unless-stopped
    networks: [verifundu]

  # ── PostgreSQL 16 ─────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: verifundu-postgres
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-verifundu}
      POSTGRES_USER:     ${POSTGRES_USER:-verifundu}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dev_password_change_me}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/01_init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-verifundu}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [verifundu]

  # ── Redis 7.2 ─────────────────────────────────────────────────
  redis:
    image: redis:7.2-alpine
    container_name: verifundu-redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-dev_redis_password} --maxmemory 512mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-dev_redis_password}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [verifundu]

  # ── MinIO (S3-compatible, Angola on-premise) ──────────────────
  minio:
    image: minio/minio:latest
    container_name: verifundu-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER:     ${MINIO_USER:-verifundu_admin}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD:-dev_minio_password}
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web console
    volumes:
      - minio_data:/data
    networks: [verifundu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  # ── Prometheus ────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: verifundu-prometheus
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    networks: [verifundu]
    profiles: [observability]

  # ── Grafana ───────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: verifundu-grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/grafana/dashboards:/etc/grafana/provisioning/dashboards
    ports:
      - "3000:3000"
    depends_on: [prometheus]
    networks: [verifundu]
    profiles: [observability]

volumes:
  postgres_data:
  redis_data:
  minio_data:
  grafana_data:

networks:
  verifundu:
    driver: bridge
